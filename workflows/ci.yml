name: CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: book.exchange

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven
          cache-dependency-path: book.exchange/pom.xml

      - name: Build project
        run: mvn clean compile

      - name: Run tests
        run: mvn test

      - name: Generate JaCoCo report
        run: mvn verify

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: spring-boot-build
          path: book.exchange/target/*.jar

      - name: Upload JaCoCo report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: book.exchange/target/site/jacoco
