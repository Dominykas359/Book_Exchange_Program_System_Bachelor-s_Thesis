<div class="history-card" (click)="onClick()">
  <div class="card-header">
    <div>
      <p class="eyebrow">Exchange #{{ history.id }}</p>
      <h3 class="card-title">Completed exchange</h3>
    </div>

    <span class="exchange-date">{{ history.timeExchanged }}</span>
  </div>

  <div class="card-content">
    <div class="book-box">
      <span class="book-label">You gave away</span>
      <p class="book-title">{{ history.givenPublication.title }}</p>
      <p class="book-author">{{ history.givenPublication.author }}</p>
    </div>

    <div class="swap-indicator">⇄</div>

    <div class="book-box">
      <span class="book-label">You received</span>
      <p class="book-title">{{ history.receivedPublication.title }}</p>
      <p class="book-author">{{ history.receivedPublication.author }}</p>
    </div>
  </div>
</div>
